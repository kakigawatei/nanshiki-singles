<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ナンシキ村のシングルス</title>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#87c9ef;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
const cv=document.getElementById("c"),ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener("resize",resize);resize();

const FONT="'Hiragino Maru Gothic ProN','Rounded Mplus 1c','BIZ UDGothic',sans-serif";
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a,b)=>a+Math.random()*(b-a);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

/* ---------- perspective（コート一面がしっかり映る引きのカメラ） ---------- */
const K=1.45,S1=1/(1+K);
const sc=z=>1/(1+K*z);
const gy=z=>{const u=(1-sc(z))/(1-S1);return H*0.82-(H*0.82-H*0.38)*u;}; // コートを画面上部に収める
const sx=(x,z)=>W/2+x*0.52*W*sc(z);
const sy=(z,y)=>gy(z)-y*0.85*H*sc(z);
const NETZ=0.5,OPPZ=0.95; // ネットはコート中央、相手はベースライン

/* ---------- audio ---------- */
let AC=null;
function beep(f,d,type,g){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended")AC.resume();
    const o=AC.createOscillator(),ga=AC.createGain(),t=AC.currentTime;
    o.type=type||"triangle";o.frequency.setValueAtTime(f,t);
    ga.gain.setValueAtTime(g||0.15,t);
    ga.gain.exponentialRampToValueAtTime(0.001,t+(d||0.12));
    o.connect(ga);ga.connect(AC.destination);o.start(t);o.stop(t+(d||0.12));
  }catch(e){}
}
let hitRaw=null,hitBuf=null;
fetch("hit.mp3").then(r=>r.arrayBuffer()).then(b=>{hitRaw=b;tryDecodeHit();}).catch(()=>{});
function tryDecodeHit(){if(AC&&hitRaw&&!hitBuf)AC.decodeAudioData(hitRaw.slice(0),b=>{hitBuf=b;},()=>{});}
function playHit(vol){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==="suspended")AC.resume();
    tryDecodeHit();
    if(hitBuf){
      const s=AC.createBufferSource(),g=AC.createGain();
      g.gain.value=vol||1;s.buffer=hitBuf;s.connect(g);g.connect(AC.destination);s.start();
      return;
    }
  }catch(e){}
  beep(880,0.10,"triangle",0.16);
}

/* ---------- sprites ---------- */
const IMG={};
["opp_ready","opp_swing_left","opp_swing_right","player_idle","player_swing_left","player_swing_right",
 "ball_cap","ball_hachimaki","ball_visor","ball_china","ball_arrow"].forEach(n=>{
  const im=new Image();im.src=n+".png";IMG[n]=im;
});
const HATS=["cap","hachimaki","visor","china","arrow"];
const ok=im=>im&&im.complete&&im.naturalWidth;

/* ---------- match state ---------- */
let state="title"; // title|fmt|serve|cpuServe|rally|ptEnd|matchEnd
let fmt=3;                 // ゲームマッチ数
let pts=[0,0],games=[0,0]; // [player, cpu]
let gameIdx=0,ptsInGame=0;
let srvNum=1;              // 1st/2nd
let pow=0,course=0;        // サーブメーター
let meterT=0;
let ball=null;             // {dir:1=自分へ -1=相手へ,t,T,fromX,toX,arc,ch,rot}
let cpuX=0,plSide="R",cpuSide="R";
let plX=0,plZ=0.03; // 操作選手の位置（ワールド座標）
let plTarget={x:0,z:0.03}; // 指で指示した目的地（選手は足の速さでゆっくり追いつく）
let touch={active:false,hist:[]}; // スワイプ検出用
// 画面座標→コート座標（前後移動用）
function screenToCourt(px,py){
  const u=clamp((H*0.82-py)/(H*0.82-H*0.38),0,0.98);
  const scv=1-u*(1-S1);
  let z=(1/scv-1)/K;
  z=clamp(z,0.03,0.45); // ベースライン〜ネット手前まで
  const x=clamp((px-W/2)/(0.52*W*sc(z)),-0.95,0.95);
  return{x,z};
}
let swing=0,swingCd=0,cpuHitT=0;
let popups=[],bursts=[],shake=0;
let banner=null;           // {main,sub,col,until,next}
let charIdx=0,rallyN=0;
let ptEndAt=0,matchWinner=null;
let last=performance.now();

const needG=()=>Math.ceil(fmt/2);
const isFinal=()=>fmt>1&&games[0]===needG()-1&&games[1]===needG()-1;
// サーバー：奇数ゲーム=自分、偶数=CPU。ファイナルは2ポイントごと交代
function serverNow(){
  if(isFinal())return (gameIdx+Math.floor(ptsInGame/2))%2;
  return gameIdx%2;
}
const CPU={reach:0.34,aim:0.55,err:0.06}; // 追いつく距離/狙いの広さ/自滅率

function addPopup(x,y,txt,col){popups.push({x,y,txt,col:col||"#ff5f7e",age:0});}
function addBurst(x,y,r){bursts.push({x,y,r,age:0});}

/* ---------- flow ---------- */
function startMatch(n){
  fmt=n;pts=[0,0];games=[0,0];gameIdx=0;ptsInGame=0;matchWinner=null;
  beep(660,0.1,"sine",0.12);
  nextPoint(800);
}
function nextPoint(delay){
  ball=null;rallyN=0;srvNum=1;
  plTarget={x:plX*0.5,z:0.03}; // ポイント間はベースラインへ戻る
  charIdx=(charIdx+1)%HATS.length;
  setTimeout(()=>{
    if(state==="matchEnd"||state==="title")return;
    if(serverNow()===0){state="serve";meterT=0;}
    else{state="cpuServe";meterT=0;}
  },delay||600);
  state="ptEnd";
}
/* ワンバウンド軌道：seg[0]=打点→バウンド地点（着地）、seg[1]=バウンド→次の打点 */
function mkIncoming(fromX,toX,T,arc,opts){ // CPU→自分
  // サーブは自分側サービスボックス（ネット〜サービスライン）、ラリーは深め
  const bz=(opts&&opts.serve)?rand(0.30,0.45):rand(0.12,0.24);
  const drift=(toX-fromX)*0.15;
  const b=Object.assign({
    dir:1,si:0,t:0,ch:charIdx,rot:0,
    seg:[
      {fx:fromX,tx:toX,fz:OPPZ,tz:bz,y0:0.30,y1:0,arc,T},
      {fx:toX,tx:clamp(toX+drift,-0.95,0.95),fz:bz,tz:-0.06,y0:0,y1:0,arc:0.20,T:T*1.05}
    ]
  },opts||{});
  ensureClear(b.seg[0]);
  return b;
}
// ネット(z=NETZ)上端を必ず越える弧に補正
function ensureClear(seg){
  const tn=(NETZ-seg.fz)/(seg.tz-seg.fz);
  if(tn>0.03&&tn<0.97){
    const base=lerp(seg.y0,seg.y1,tn);
    const need=(0.27-base)/Math.sin(Math.PI*tn);
    if(need>seg.arc)seg.arc=need;
  }
}
function mkOutgoing(fromX,fromZ,toX,T,arc,opts){ // 自分→CPU
  // サーブは相手サービスボックス、ラリーは深くベースライン際へ（bz指定があれば優先＝スワイプの強弱）
  const bz=(opts&&opts.bz!==undefined)?opts.bz:((opts&&opts.serve)?rand(0.56,0.72):rand(0.72,0.88));
  const drift=(toX-fromX)*0.12;
  const b=Object.assign({
    dir:-1,si:0,t:0,ch:ball?ball.ch:charIdx,rot:0,
    seg:[
      {fx:fromX,tx:toX,fz:fromZ,tz:bz,y0:0.30,y1:0,arc,T},
      {fx:toX,tx:clamp(toX+drift,-0.9,0.9),fz:bz,tz:OPPZ,y0:0,y1:0.28,arc:0.10,T:0.40}
    ]
  },opts||{});
  ensureClear(b.seg[0]);
  return b;
}
function launchServe(who,powV,courseV){
  const T=who===0?lerp(0.85,0.38,powV):lerp(0.95,0.45,powV);
  const arc=lerp(0.26,0.10,powV);
  if(who===0){ // 自分→CPU
    ball=mkOutgoing(0,0.02,courseV*0.8,T,arc,{pow:powV,serve:true});
    playHit(1);swing=0.25;plSide=courseV<0?"L":"R";
  }else{ // CPU→自分
    ball=mkIncoming(cpuX,courseV*0.75,T,arc,{pow:powV,serve:true});
    playHit(0.45);cpuHitT=0.3;cpuSide=courseV<0?"L":"R";
  }
  state="rally";
}
function pointEnd(winner,main,sub,col){
  pts[winner]++;ptsInGame++;
  const target=isFinal()?7:4;
  const lead=Math.abs(pts[0]-pts[1]);
  let gameWon=-1;
  if((pts[0]>=target||pts[1]>=target)&&lead>=2)gameWon=pts[0]>pts[1]?0:1;
  banner={main,sub:sub||"",col:col||(winner===0?"#ff9a2e":"#5b7a99"),until:performance.now()+1300};
  beep(winner===0?990:220,0.15,winner===0?"sine":"sawtooth",0.13);
  if(winner===0)shake=0;else shake=6;
  state="ptEnd";
  setTimeout(()=>{
    if(gameWon>=0){
      games[gameWon]++;
      const gTxt=(gameWon===0?"ゲーム獲得！🔥":"ゲームを取られた…");
      if(games[gameWon]>=needG()){
        matchWinner=gameWon;
        banner=null;state="matchEnd";
        if(gameWon===0)[880,1100,1320,1760].forEach((f,i)=>setTimeout(()=>beep(f,0.18,"sine",0.15),i*120));
        return;
      }
      banner={main:gTxt,sub:"ゲームカウント "+games[0]+"-"+games[1],col:gameWon===0?"#ff6a00":"#5b7a99",until:performance.now()+1600};
      pts=[0,0];ptsInGame=0;gameIdx++;
      nextPoint(1700);
    }else{
      nextPoint(900);
    }
  },1350);
}

/* ---------- rally logic ---------- */
function ballPos(){
  const s=ball.seg[ball.si],t=ball.t;
  const z=lerp(s.fz,s.tz,t);
  const x=lerp(s.fx,s.tx,t);
  const y=lerp(s.y0,s.y1,t)+Math.sin(Math.PI*t)*s.arc;
  return{x,z,y,bx:sx(x,z),by:sy(z,y),br:Math.max(7,0.085*W*sc(Math.max(0,z)))};
}
let bounceFx=[];
function cpuTryReturn(){
  // CPUの打点（seg[1]の終点）で拾えるか判定
  const cx=ball.seg[1].tx;
  const gap=Math.abs(cx-cpuX);
  const noTouch=gap>0.32; // 追いつけない＝ノータッチ
  const speedPenalty=(0.60-ball.seg[0].T)*1.2; // 速いほど拾いにくい
  const volleyBonus=ball.volley?0.15:0;
  const dropBonus=ball.drop?0.16:0; // ネット際に落とすとCPUは前に走れず拾いにくい
  let missP=clamp(gap*2.2+speedPenalty+volleyBonus+dropBonus-0.18,0.03,0.97);
  if(noTouch)missP=0.97;
  if(ball.serve&&ball.pow>0.86&&gap>0.28)missP=Math.max(missP,0.85); // 強サーブエース
  if(Math.random()<missP){
    let label="ウィナー！！";
    if(ball.serve)label=noTouch?"ノータッチエース！！":"サービスエース！！";
    else if(noTouch)label="ノータッチエース！！";
    else if(ball.volley)label="ボレーが決まった！";
    addBurst(sx(cx,OPPZ),gy(OPPZ)-30,26);
    pointEnd(0,label,rallyN>3?"ナイスラリー！":"",null);
    return;
  }
  if(Math.random()<CPU.err){
    pointEnd(0,"相手のミス！","ラッキー！",null);
    return;
  }
  // 返球：プレイヤーの逆を突く
  cpuX=cx;
  playHit(0.45);cpuHitT=0.3;
  rallyN++;
  const aim=clamp(rand(-CPU.aim,CPU.aim)+(Math.random()<0.3?(cx>0?-0.3:0.3):0),-0.8,0.8);
  const T=Math.max(0.45,lerp(0.85,0.52,Math.min(1,rallyN/8)));
  cpuSide=aim<cpuX?"L":"R";
  ball=mkIncoming(cpuX,aim,T,rand(0.12,0.26),{ch:ball.ch});
}
/* スワイプでショット：norm=スワイプの強さ(0.35〜1) */
function attemptHit(norm){
  swing=0.25;swingCd=0.26;
  if(!ball||ball.dir!==1||state!=="rally"){return;}
  const p=ballPos();
  const afterBounce=ball.si===1;
  const beforeBounce=ball.si===0&&p.z<=NETZ+0.02;
  const reachOk=Math.hypot(p.x-plX,(p.z-plZ)*1.2)<=0.38; // 選手の届く範囲（前後も考慮）
  if((!afterBounce&&!beforeBounce)||!reachOk){
    beep(250,0.09,"sine",0.07);
    addPopup(sx(plX,0.06),gy(0.10),"スカッ","#9aa7b5");
    return;
  }
  // タイミング→コース（引きつけ式）
  const zMax=afterBounce?Math.max(0.12,ball.seg[1].fz):NETZ+0.02;
  const zN=0.06;
  let tau;
  if(p.z>=zN)tau=0.5+0.5*Math.min(1,(p.z-zN)/(zMax-zN));
  else tau=0.5*(Math.max(0,p.z)/zN);
  const sideSign=p.x>=plX?1:-1;
  let toX=sideSign*(1-2*tau)*(0.7+Math.abs(p.x)*0.3)+rand(-0.05,0.05);
  toX=clamp(toX,-0.92,0.92);
  const volley=beforeBounce;
  // スワイプの強さ→深さと速さ：強＝ベースライン際へ速く、弱＝ネット際に落とす
  const bz=lerp(0.55,0.88,norm);
  const T=(volley?0.80:1)*lerp(0.72,0.40,norm); // 球速アップ（ボレー/スマッシュはさらに速い）
  const arc=lerp(0.30,0.16,norm);
  rallyN++;
  playHit(1);
  addBurst(p.bx,p.by,p.br);
  plSide=p.x<plX?"L":"R";
  ball=mkOutgoing(p.x,Math.max(0.02,p.z),toX,T,arc,{ch:ball.ch,volley,bz,drop:bz<0.62});
}

/* ---------- update ---------- */
function update(dt){
  swing=Math.max(0,swing-dt);
  swingCd=Math.max(0,swingCd-dt);
  cpuHitT=Math.max(0,cpuHitT-dt);
  // 選手は指の指示に向かって「足の速さ」でゆっくり追いつく（スイング中は足を止める）
  if((state==="rally"||state==="ptEnd"||state==="cpuServe")&&swing<=0.12){
    const spdX=0.95*dt,spdZ=0.42*dt;
    plX+=clamp(plTarget.x-plX,-spdX,spdX);
    plZ+=clamp(plTarget.z-plZ,-spdZ,spdZ);
  }
  shake=Math.max(0,shake-dt*30);
  meterT+=dt;
  popups.forEach(p=>p.age+=dt);popups=popups.filter(p=>p.age<0.9);
  bursts.forEach(b=>b.age+=dt);bursts=bursts.filter(b=>b.age<0.35);

  if(state==="cpuServe"&&meterT>0.9){
    // CPUサーブ（たまにフォルト）
    if(Math.random()<0.06){
      pointEnd(0,"ダブルフォルト！","相手のサーブミス",null);
    }else{
      launchServe(1,rand(0.45,0.85),rand(-0.75,0.75));
    }
    return;
  }
  bounceFx.forEach(b=>b.age+=dt);bounceFx=bounceFx.filter(b=>b.age<0.4);
  if(state!=="rally")return;
  if(!ball)return;
  ball.t+=dt/ball.seg[ball.si].T;
  ball.rot+=dt*(ball.dir===1?9:-9);
  if(ball.dir===-1){
    // CPUはボールがネットを越えたあたりで反応し、足の速さの上限つきで走る
    const reacted=ball.si===1||ball.t>0.45;
    if(reacted){
      const spd=0.60*dt;
      cpuX+=clamp(ball.seg[1].tx-cpuX,-spd,spd);
    }
  }
  if(ball.t>=1){
    if(ball.si===0){
      // ワンバウンド
      ball.si=1;ball.t=0;
      const s=ball.seg[1];
      bounceFx.push({x:sx(s.fx,s.fz),y:gy(s.fz),age:0});
      beep(320,0.05,"sine",0.07);
    }else{
      if(ball.dir===1){
        pointEnd(1,ball.serve?"サービスエースを取られた…":"取れなかった…","ツーバウンド",null);
      }else{
        cpuTryReturn();
      }
    }
  }
}

/* ---------- input ---------- */
cv.addEventListener("pointerdown",e=>{
  e.preventDefault();
  if(AC&&AC.state==="suspended")AC.resume();
  const px=e.clientX,py=e.clientY;
  touch.active=true;touch.hist=[{x:px,y:py,t:performance.now()}];
  if(state==="rally"||state==="ptEnd"||state==="cpuServe")plTarget=screenToCourt(px,py);
  if(state==="title"){state="fmt";beep(660,0.08,"sine",0.1);return;}
  if(state==="fmt"){
    const opts=[1,3,5];
    for(let i=0;i<3;i++){
      const y0=H*(0.30+i*0.16);
      if(py>=y0&&py<=y0+H*0.12&&px>=W*0.12&&px<=W*0.88){startMatch(opts[i]);return;}
    }
    return;
  }
  if(state==="matchEnd"){state="title";return;}
  if(state==="serve"){
    // ゲージ1本：角度（コース）だけ調整。端の赤ゾーンだけフォルト
    course=meterVal()*2-1; // -1..1
    if(Math.abs(course)>0.93){
      if(srvNum===1){
        srvNum=2;
        banner={main:"フォルト！",sub:"セカンドサーブ",col:"#d94848",until:performance.now()+900};
        beep(240,0.15,"sawtooth",0.1);
        state="serve";meterT=0;
      }else{
        pointEnd(1,"ダブルフォルト…","はしっこの赤だけ気をつけて！","#d94848");
      }
      return;
    }
    // パワーは自動（コースが端に近いほど強い攻めサーブ）
    pow=0.62+Math.abs(course)*0.3+rand(-0.04,0.04);
    launchServe(0,pow,course);
    return;
  }
  // ラリー中の操作はなぞり移動＋上スワイプ（pointermove側で処理）
},{passive:false});

cv.addEventListener("pointermove",e=>{
  if(!touch.active)return;
  e.preventDefault();
  const px=e.clientX,py=e.clientY,now=performance.now();
  touch.hist.push({x:px,y:py,t:now});
  while(touch.hist.length&&now-touch.hist[0].t>180)touch.hist.shift();
  // すばやい上方向の動き＝スイング動作中とみなし、移動指示には使わない
  let maxY=-1e9;
  for(const h of touch.hist)if(h.y>maxY)maxY=h.y;
  const dyRecent=maxY-py;
  const flicking=dyRecent>H*0.02;
  // 1) 指で目的地を指示（前後・斜めもOK。選手は足の速さでゆっくり追いつく）
  if(!flicking&&(state==="rally"||state==="ptEnd"||state==="cpuServe")){
    plTarget=screenToCourt(px,py);
  }
  // 2) 上フリック検出：すばやい上はらい（180ms内にH*0.07以上）でスイング
  if(state==="rally"&&swingCd<=0){
    let maxY=-1e9;
    for(const h of touch.hist)if(h.y>maxY)maxY=h.y;
    const dy=maxY-py;
    if(dy>H*0.07){
      const norm=clamp(dy/(H*0.20),0.35,1);
      touch.hist=[{x:px,y:py,t:now}];
      plTarget={x:plX,z:plZ}; // フリックで選手が吹っ飛ばないように
      attemptHit(norm);
    }
  }
},{passive:false});
cv.addEventListener("pointerup",()=>{touch.active=false;touch.hist=[];});
cv.addEventListener("pointercancel",()=>{touch.active=false;touch.hist=[];});
// メーター値：0..1を往復
function meterVal(){
  const speed=srvNum===1?2.0:1.5; // 2ndは遅くて簡単
  const v=(Math.sin(meterT*speed*Math.PI-Math.PI/2)+1)/2;
  return v;
}

/* ---------- render ---------- */
function roundRect(x,y,w2,h2,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w2,y,x+w2,y+h2,r);ctx.arcTo(x+w2,y+h2,x,y+h2,r);
  ctx.arcTo(x,y+h2,x,y,r);ctx.arcTo(x,y,x+w2,y,r);ctx.closePath();
}
function outlineText(txt,x,y,size,fill,stroke,lw){
  ctx.font="bold "+size+"px "+FONT;
  ctx.textAlign="center";ctx.textBaseline="middle";ctx.lineJoin="round";
  ctx.lineWidth=lw||size*0.18;ctx.strokeStyle=stroke||"#fff";
  ctx.strokeText(txt,x,y);
  ctx.fillStyle=fill;ctx.fillText(txt,x,y);
}
function drawBallChar(x,y,r,rot){
  const img=IMG["ball_"+HATS[ball?ball.ch:0]];
  if(ok(img)){
    const s=2.25*r/Math.max(img.naturalWidth,img.naturalHeight);
    ctx.save();ctx.translate(x,y);ctx.rotate(rot||0);
    ctx.drawImage(img,-img.naturalWidth*s/2,-img.naturalHeight*s/2,img.naturalWidth*s,img.naturalHeight*s);
    ctx.restore();
  }else{
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle="#fff";ctx.fill();ctx.strokeStyle="#333";ctx.stroke();
  }
}
function render(){
  ctx.save();
  if(shake>0)ctx.translate(rand(-shake,shake),rand(-shake,shake));
  // sky
  const g=ctx.createLinearGradient(0,0,0,H*0.5);
  g.addColorStop(0,"#8fd3f4");g.addColorStop(1,"#d9f0fb");
  ctx.fillStyle=g;ctx.fillRect(-20,-20,W+40,H*0.55);
  ctx.fillStyle="rgba(255,255,255,0.85)";
  [[0.2,0.09],[0.7,0.14]].forEach(c=>{
    ctx.beginPath();ctx.ellipse(c[0]*W,c[1]*H,W*0.09,H*0.024,0,0,Math.PI*2);ctx.fill();
  });
  // trees & fence
  ctx.fillStyle="#3f9a55";
  for(let i=0;i<9;i++){
    ctx.beginPath();ctx.ellipse((i+0.5)/9*W,gy(1)-H*0.115,W*0.075,H*0.045,0,0,Math.PI*2);ctx.fill();
  }
  const fTop=gy(1)-H*0.095;
  ctx.fillStyle="#2e7d46";ctx.fillRect(-20,fTop,W+40,gy(1)-fTop);
  ctx.strokeStyle="rgba(0,0,0,0.22)";ctx.lineWidth=1;
  for(let x=0;x<W;x+=14){ctx.beginPath();ctx.moveTo(x,fTop);ctx.lineTo(x,gy(1));ctx.stroke();}
  // ground & court
  ctx.fillStyle="#5aa54e";ctx.fillRect(-20,gy(1),W+40,H-gy(1)+20);
  ctx.beginPath();
  ctx.moveTo(sx(-1.15,1),gy(1));ctx.lineTo(sx(1.15,1),gy(1));
  ctx.lineTo(sx(1.15,0),gy(0)+H*0.07);ctx.lineTo(sx(-1.15,0),gy(0)+H*0.07);
  ctx.closePath();ctx.fillStyle="#3f8f3f";ctx.fill();
  ctx.strokeStyle="#fff";
  const line=(x1,z1,x2,z2,w2)=>{ctx.lineWidth=w2||3;ctx.beginPath();ctx.moveTo(sx(x1,z1),gy(z1));ctx.lineTo(sx(x2,z2),gy(z2));ctx.stroke();};
  line(-0.85,0.02,-0.85,0.97);line(0.85,0.02,0.85,0.97);
  line(-0.85,0.02,0.85,0.02,3);line(-0.85,0.97,0.85,0.97,3);
  line(-0.85,0.26,0.85,0.26,2);line(-0.85,0.74,0.85,0.74,2);
  line(0,0.26,0,0.74,2);

  // CPU（ネットより奥）
  {
    let img=cpuHitT>0?(cpuSide==="L"?IMG.opp_swing_left:IMG.opp_swing_right):IMG.opp_ready;
    if(!ok(img))img=IMG.opp_ready;
    const oxp=sx(cpuX,OPPZ),og=gy(OPPZ);
    if(ok(img)){
      const poseK=img===IMG.opp_swing_right?0.94:1;
      const oh=0.55*W*sc(OPPZ)*poseK;
      const ow=oh*img.naturalWidth/img.naturalHeight;
      const bob=cpuHitT>0?0:Math.sin(performance.now()/280)*H*0.003;
      ctx.fillStyle="rgba(0,0,0,0.18)";
      ctx.beginPath();ctx.ellipse(oxp,og,ow*0.42,oh*0.07,0,0,Math.PI*2);ctx.fill();
      ctx.drawImage(img,oxp-ow/2,og-oh+bob,ow,oh);
    }
  }

  // 着地予測マーカー（自分側に飛んでくるボールのバウンド地点）
  if(ball&&state==="rally"&&ball.dir===1&&ball.si===0){
    const s=ball.seg[0];
    const mx=sx(s.tx,s.tz),my=gy(s.tz);
    const pulse=1+0.15*Math.sin(performance.now()/120);
    ctx.strokeStyle="rgba(255,220,80,0.8)";ctx.lineWidth=3;
    ctx.beginPath();ctx.ellipse(mx,my,W*0.035*pulse,W*0.013*pulse,0,0,Math.PI*2);ctx.stroke();
  }
  // バウンドの波紋
  bounceFx.forEach(b=>{
    const k=b.age/0.4;
    ctx.strokeStyle=`rgba(255,255,255,${(1-k).toFixed(2)})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(b.x,b.y,W*0.04*k+4,W*0.015*k+2,0,0,Math.PI*2);ctx.stroke();
  });

  const p=ball?ballPos():null;
  const drawBall=()=>{
    if(!p)return;
    ctx.fillStyle="rgba(0,0,0,0.18)";
    ctx.beginPath();ctx.ellipse(p.bx,gy(p.z),p.br*0.8,p.br*0.25,0,0,Math.PI*2);ctx.fill();
    const a=ball.rot*1.4;
    ctx.strokeStyle="rgba(255,255,255,0.6)";
    ctx.lineWidth=Math.max(2,p.br*0.13);ctx.lineCap="round";
    ctx.beginPath();ctx.arc(p.bx,p.by,p.br*1.32,a,a+1.0);ctx.stroke();
    ctx.beginPath();ctx.arc(p.bx,p.by,p.br*1.32,a+Math.PI,a+Math.PI+1.0);ctx.stroke();
    drawBallChar(p.bx,p.by,p.br,Math.sin(ball.rot)*0.3);
  };
  if(p&&p.z>NETZ)drawBall();

  // net
  const nTop=sy(NETZ,0.20),nG=gy(NETZ);
  const nx1=sx(-1.0,NETZ),nx2=sx(1.0,NETZ);
  ctx.fillStyle="rgba(30,42,70,0.42)";ctx.fillRect(nx1,nTop,nx2-nx1,nG-nTop);
  ctx.strokeStyle="rgba(255,255,255,0.55)";ctx.lineWidth=1;
  for(let x=nx1;x<=nx2;x+=9){ctx.beginPath();ctx.moveTo(x,nTop);ctx.lineTo(x,nG);ctx.stroke();}
  for(let y=nTop;y<=nG;y+=8){ctx.beginPath();ctx.moveTo(nx1,y);ctx.lineTo(nx2,y);ctx.stroke();}
  ctx.fillStyle="#fff";ctx.fillRect(nx1,nTop-4,nx2-nx1,7);
  ctx.strokeStyle="#38424f";ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(nx1,nTop-4);ctx.lineTo(nx1,nG);ctx.stroke();
  ctx.beginPath();ctx.moveTo(nx2,nTop-4);ctx.lineTo(nx2,nG);ctx.stroke();

  if(p&&p.z<=NETZ)drawBall();

  // player
  {
    let img=swing>0?(plSide==="L"?IMG.player_swing_left:IMG.player_swing_right):IMG.player_idle;
    if(!ok(img))img=IMG.player_idle;
    if(ok(img)){
      const depth=sc(plZ)/sc(0.03); // 前に出ると小さく見える
      const ph=0.34*W*depth*(swing>0?1.05:1);
      const pw=ph*img.naturalWidth/img.naturalHeight;
      const bob=swing>0?0:Math.sin(performance.now()/300)*H*0.004;
      const pfoot=gy(plZ);
      const pcx=sx(plX,plZ);
      ctx.fillStyle="rgba(0,0,0,0.18)";
      ctx.beginPath();ctx.ellipse(pcx,pfoot,pw*0.42,ph*0.06,0,0,Math.PI*2);ctx.fill();
      ctx.drawImage(img,pcx-pw/2,pfoot-ph+bob,pw,ph);
    }
  }

  // bursts & popups
  bursts.forEach(b=>{
    const k=b.age/0.35,alpha=1-k;
    ctx.strokeStyle="rgba(255,214,60,"+alpha.toFixed(2)+")";
    ctx.lineWidth=Math.max(2,b.r*0.14);ctx.lineCap="round";
    for(let i=0;i<6;i++){
      const ang=i*Math.PI/3+0.4;
      const r0=b.r*(1.1+k*1.6),r1=r0+b.r*0.45;
      ctx.beginPath();
      ctx.moveTo(b.x+Math.cos(ang)*r0,b.y+Math.sin(ang)*r0);
      ctx.lineTo(b.x+Math.cos(ang)*r1,b.y+Math.sin(ang)*r1);
      ctx.stroke();
    }
  });
  popups.forEach(pp=>{
    const a=1-pp.age/0.9;
    ctx.globalAlpha=Math.max(0,a);
    outlineText(pp.txt,pp.x,pp.y-pp.age*70,Math.min(W*0.07,30),pp.col,"#fff");
    ctx.globalAlpha=1;
  });

  // scoreboard
  if(state!=="title"&&state!=="fmt"){
    ctx.fillStyle="rgba(20,40,30,0.75)";
    roundRect(W*0.5-W*0.36,H*0.015,W*0.72,H*0.09,14);ctx.fill();
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.font="bold "+(W*0.042)+"px "+FONT;
    const srv=serverNow();
    ctx.fillStyle="#ffd76e";
    ctx.fillText((srv===0?"● ":"")+"あなた",W*0.30,H*0.042);
    ctx.fillText("ライバル"+(srv===1?" ●":""),W*0.70,H*0.042);
    ctx.font="bold "+(W*0.06)+"px "+FONT;
    ctx.fillStyle="#fff";
    ctx.fillText(games[0]+"  -  "+games[1],W*0.5,H*0.045);
    ctx.font="bold "+(W*0.045)+"px "+FONT;
    ctx.fillStyle="#9fe0b0";
    const dTxt=isFinal()?"ファイナル ":"";
    ctx.fillText(dTxt+pts[0]+" : "+pts[1],W*0.5,H*0.085);
    if(!isFinal()&&pts[0]>=3&&pts[1]>=3){
      ctx.fillStyle="#ffd76e";ctx.font="bold "+(W*0.03)+"px "+FONT;
      ctx.fillText("デュース",W*0.5,H*0.115);
    }
  }

  // serve meter（1本：角度だけ）
  if(state==="serve"){
    const v=meterVal();
    ctx.fillStyle="rgba(20,40,30,0.8)";
    roundRect(W*0.08,H*0.845,W*0.84,H*0.115,16);ctx.fill();
    outlineText("サーブのかくど！"+(srvNum===2?"（2ndサーブ）":""),W/2,H*0.873,W*0.045,"#fff","#2e7d46");
    const bx=W*0.13,bw=W*0.74,by=H*0.905,bh=H*0.032;
    // 中央=安全（緑）、左右=攻めコース（黄）、最端のみフォルト（赤・せまい）
    ctx.fillStyle="#9fe0b0";roundRect(bx,by,bw,bh,8);ctx.fill();
    ctx.fillStyle="#ffd76e";
    ctx.fillRect(bx+bw*0.035,by,bw*0.165,bh);
    ctx.fillRect(bx+bw*0.80,by,bw*0.165,bh);
    ctx.fillStyle="#d94848";
    ctx.fillRect(bx,by,bw*0.035,bh);
    ctx.fillRect(bx+bw*0.965,by,bw*0.035,bh);
    ctx.fillStyle="#2b6bd9";
    ctx.fillRect(bx+bw*v-4,by-5,8,bh+10);
    ctx.strokeStyle="#fff";ctx.lineWidth=2;
    ctx.strokeRect(bx+bw*v-4,by-5,8,bh+10);
    ctx.font="bold "+(W*0.028)+"px "+FONT;
    ctx.fillStyle="#d9e5dc";ctx.textAlign="center";
    ctx.fillText("黄色で止めると攻めのコース！赤だけフォルト",W/2,H*0.958);
  }
  if(state==="cpuServe"){
    outlineText("ライバルのサーブ…",W/2,H*0.88,W*0.05,"#4a4a4a","#fff");
  }

  // banner
  if(banner&&performance.now()<banner.until){
    outlineText(banner.main,W/2,H*0.40,W*0.085,banner.col,"#fff",W*0.018);
    if(banner.sub)outlineText(banner.sub,W/2,H*0.47,W*0.042,"#4a4a4a","#fff");
  }

  if(state==="title")renderTitle();
  if(state==="fmt")renderFmt();
  if(state==="matchEnd")renderEnd();
  ctx.restore();
}
function renderTitle(){
  ctx.fillStyle="rgba(30,50,35,0.35)";ctx.fillRect(0,0,W,H);
  outlineText("ナンシキ村の",W/2,H*0.20,W*0.09,"#fff","#2e7d46",W*0.02);
  outlineText("シングルス",W/2,H*0.29,W*0.14,"#ffd76e","#7a4a00",W*0.026);
  outlineText("🎾 ライバルとガチンコ勝負！ 🎾",W/2,H*0.40,W*0.045,"#fff","#2e7d46");
  ctx.font="bold "+(W*0.038)+"px "+FONT;
  ctx.fillStyle="#fff";ctx.textAlign="center";
  ctx.fillText("サーブ：メーターをタップして角度をきめる",W/2,H*0.50);
  ctx.fillText("移動：指でなぞると選手がついてくる",W/2,H*0.545);
  ctx.fillText("ショット：上にスワイプ！強くはらうと強打、",W/2,H*0.59);
  ctx.fillText("やさしくはらうとネット際に落とせる",W/2,H*0.635);
  if(Math.floor(performance.now()/600)%2===0)
    outlineText("タップしてスタート！",W/2,H*0.75,W*0.065,"#2b6bd9","#fff");
}
function renderFmt(){
  ctx.fillStyle="rgba(30,50,35,0.45)";ctx.fillRect(0,0,W,H);
  outlineText("なんゲームマッチ？",W/2,H*0.20,W*0.07,"#fff","#2e7d46",W*0.014);
  const labels=[["1ゲーム","さくっと1本勝負"],["3ゲーム","2ゲーム先取（ファイナルあり）"],["5ゲーム","3ゲーム先取・本格派"]];
  labels.forEach(([name,desc],i)=>{
    const y0=H*(0.30+i*0.16);
    ctx.fillStyle="rgba(255,250,240,0.95)";
    roundRect(W*0.12,y0,W*0.76,H*0.12,18);ctx.fill();
    ctx.strokeStyle="#2e7d46";ctx.lineWidth=4;
    roundRect(W*0.12,y0,W*0.76,H*0.12,18);ctx.stroke();
    outlineText(name,W/2,y0+H*0.045,W*0.06,"#2e7d46","#fff");
    ctx.font="bold "+(W*0.032)+"px "+FONT;
    ctx.fillStyle="#4a4a4a";ctx.textAlign="center";
    ctx.fillText(desc,W/2,y0+H*0.09);
  });
}
function renderEnd(){
  ctx.fillStyle="rgba(30,50,35,0.5)";ctx.fillRect(0,0,W,H);
  const win=matchWinner===0;
  outlineText(win?"🏆 かち！！ 🏆":"まけた…",W/2,H*0.30,W*0.1,win?"#ffd76e":"#8aa","#7a4a00",W*0.02);
  outlineText("ゲームカウント "+games[0]+" - "+games[1],W/2,H*0.41,W*0.055,"#fff","#2e7d46");
  outlineText(win?"ナンシキ村さいきょうだ！":"つぎはかてる！リベンジだ！",W/2,H*0.49,W*0.045,"#fff","#2e7d46");
  if(performance.now()%1200<600)
    outlineText("タップでタイトルへ",W/2,H*0.68,W*0.05,"#2b6bd9","#fff");
}

function loop(now){
  const dt=Math.min(0.033,(now-last)/1000);last=now;
  update(dt);render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
